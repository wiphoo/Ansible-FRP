---
# FRP Server Example
- name: Deploy FRP Server
  hosts: frp_servers
  become: true
  vars:
    frp_version: "0.64.0"
  roles:
    - role: wiphoo.frp.frp_install
      vars:
        frp_install_files: ['frps']
        frp_install_create_service: true

---
# FRP Client Example
- name: Deploy FRP Client
  hosts: frp_clients
  become: true
  vars:
    frp_version: "0.64.0"
  roles:
    - role: wiphoo.frp.frp_install
      vars:
        frp_install_files: ['frpc']
        frp_install_create_service: true

---
# Advanced Server Configuration
- name: Deploy FRP Server with Custom Settings
  hosts: frp_servers
  become: true
  vars:
    frp_version: "0.64.0"
    frp_server_bind_port: 7000
    frp_server_token: "your-secret-token"
  roles:
    - role: wiphoo.frp.frp_install
      vars:
        frp_install_files: ['frps']
        frp_install_create_service: true

---
# Advanced Client Configuration
- name: Deploy FRP Client with Custom Settings
  hosts: frp_clients
  become: true
  vars:
    frp_version: "0.64.0"
    frp_server_addr: "your-server.example.com"
    frp_server_port: 7000
    frp_token: "your-secret-token"
  roles:
    - role: wiphoo.frp.frp_install
      vars:
        frp_install_files: ['frpc']
        frp_install_create_service: true
