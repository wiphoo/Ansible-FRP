name: Deploy Documentation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        echo "UV_CACHE_DIR=$HOME/.uv-cache" >> $GITHUB_ENV

    - name: Cache uv dependencies
      uses: actions/cache@v4
      with:
        path: ~/.uv-cache
        key: ${{ runner.os }}-uv-${{ hashFiles('**/pyproject.toml', '**/uv.lock', '**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-uv-

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev]"

    - name: Setup MkDocs
      run: |
        # Create docs-site directory structure
        mkdir -p docs-site/docs/roles

        # Copy configuration and documentation files
        cp mkdocs.yml docs-site/

        # Copy docs directory contents if it exists
        if [ -d "docs" ] && [ "$(ls -A docs)" ]; then
          cp -r docs/* docs-site/docs/ 2>/dev/null || true
        fi

        # Copy README as index if it exists
        if [ -f "README.md" ]; then
          cp README.md docs-site/docs/index.md
        fi

    - name: Create documentation pages
      run: |
        cd docs-site

        # Create installation page
        cat > docs/installation.md << 'EOF'
        # Installation

        ## Install from Ansible Galaxy

        ```bash
        ansible-galaxy collection install wiphoo.frp
        ```

        ## Install from source

        Clone the repository and install locally:

        ```bash
        git clone https://github.com/wiphoo/Ansible-FRP.git
        cd Ansible-FRP
        ansible-galaxy collection install .
        ```

        ## Requirements

        - Ansible 2.9 or later
        - Target systems: Ubuntu (Focal, Jammy) or compatible Debian-based distributions
        - Internet access for downloading frp binaries
        EOF

        # Create usage page
        cat > docs/usage.md << 'EOF'
        # Usage

        ## Basic Installation

        Include the `frp_install` role in your playbook:

        ```yaml
        ---
        - name: Install frp
          hosts: servers
          become: true
          roles:
            - wiphoo.frp.frp_install
        ```

        ## Advanced Configuration

        Override default variables as needed:

        ```yaml
        ---
        - name: Install frp with custom settings
          hosts: servers
          become: true
          roles:
            - role: wiphoo.frp.frp_install
              frp_version: "0.63.0"
              frp_user: "frpuser"
              frp_install_dir: "/opt/frp"
        ```

        ## Example Playbook

        ```yaml
        ---
        - name: Deploy frp server
          hosts: frp_servers
          become: true
          vars:
            frp_version: "0.63.0"
          roles:
            - wiphoo.frp.frp_install
          tasks:
            - name: Configure frp server
              template:
                src: frps.ini.j2
                dest: /etc/frp/frps.toml
              notify: restart frp server

          handlers:
            - name: restart frp server
              service:
                name: frps
                state: restarted
        ```
        EOF

        # Create roles documentation
        cat > docs/roles/frp_install.md << 'EOF'
        # frp_install Role

        This Ansible role installs frp (Fast Reverse Proxy) on supported Linux systems.

        ## Requirements

        - Ansible 2.9+
        - Target systems: Ubuntu (Focal, Jammy)

        ## Role Variables

        | Variable | Default | Description |
        |----------|---------|-------------|
        | `frp_version` | `0.63.0` | Version of frp to install |
        | `frp_user` | `frp` | System user for running frp |
        | `frp_group` | `frp` | System group for frp |
        | `frp_install_dir` | `/usr/local/bin/frp` | Directory to install frp binaries |
        | `frp_config_dir` | `/etc/frp` | Directory for frp configuration files |
        | `frp_log_dir` | `/var/log/frp` | Directory for frp log files |
        | `frp_tmp_dir` | `/tmp` | Temporary directory for downloads |
        | `frp_install_files` | `[frps, frpc]` | List of frp binaries to install |

        ## Example Playbook

        ```yaml
        - hosts: servers
          roles:
            - frp_install
        ```
        EOF

        # Create API reference
        cat > docs/api.md << 'EOF'
        # API Reference

        ## Collection Structure

        ```
        wiphoo.frp/
        ├── roles/
        │   └── frp_install/
        │       ├── defaults/
        │       ├── files/
        │       ├── handlers/
        │       ├── meta/
        │       ├── tasks/
        │       ├── templates/
        │       └── vars/
        ├── docs/
        ├── plugins/
        └── README.md
        ```

        ## Role: frp_install

        ### Tasks Performed

        1. **System Detection**: Detects OS and architecture
        2. **Package Installation**: Installs required system packages
        3. **User/Group Creation**: Creates frp system user and group
        4. **Directory Setup**: Creates necessary directories
        5. **Download & Verification**: Downloads and verifies frp binaries
        6. **Installation**: Installs frp binaries to target location

        ### Variables Reference

        See the role documentation for complete variable reference.
        EOF

        # Create contributing page
        cat > docs/contributing.md << 'EOF'
        # Contributing

        We welcome contributions! Here's how you can help:

        ## Development Setup

        1. Fork the repository
        2. Clone your fork: `git clone https://github.com/YOUR_USERNAME/Ansible-FRP.git`
        3. Create a feature branch: `git checkout -b feature/my-feature`
        4. Make your changes and test them
        5. Commit your changes: `git commit -am 'Add some feature'`
        6. Push to the branch: `git push origin feature/my-feature`
        7. Submit a pull request

        ## Guidelines

        - Follow Ansible best practices
        - Add tests for new functionality
        - Update documentation as needed
        - Ensure all tests pass before submitting

        ## Testing

        Run the test suite locally:

        ```bash
        # Run Ansible linting
        ansible-lint roles/

        # Run molecule tests (if configured)
        molecule test
        ```

        ## Code Style

        - Use YAML for playbooks and variable files
        - Follow Ansible naming conventions
        - Add comments for complex tasks
        - Use meaningful variable names
        EOF

        # Create security page
        cat > docs/security.md << 'EOF'
        # Security

        ## Security Features

        This collection implements comprehensive security scanning:

        🔒 **Secret Detection**: Automated scanning for exposed secrets and credentials
        🛡️ **Vulnerability Scanning**: Regular checks for security vulnerabilities in dependencies
        🔍 **Code Review**: AI-powered code analysis for security best practices
        📊 **Dependency Analysis**: Monitoring of third-party dependencies for known vulnerabilities
        ⚡ **Security Testing**: Automated security testing and validation

        ## Reporting Vulnerabilities

        If you discover a security vulnerability, please report it responsibly:

        1. **Do not** create public GitHub issues for security vulnerabilities
        2. Email security reports to: [security@wiphoo.dev](mailto:security@wiphoo.dev)
        3. Include detailed information about the vulnerability
        4. Allow reasonable time for response and fix

        ## Security Updates

        Security updates will be:
        - Released as patch versions (1.0.x)
        - Documented in release notes
        - Announced through GitHub releases
        - Backported to supported versions when applicable
        EOF

    - name: Build with MkDocs
      run: |
        cd docs-site

        # Verify that we have the necessary files
        if [ ! -f "mkdocs.yml" ]; then
          echo "Error: mkdocs.yml not found in docs-site/"
          exit 1
        fi

        if [ ! -d "docs" ]; then
          echo "Error: docs directory not found in docs-site/"
          exit 1
        fi

        # Build the documentation
        mkdocs build

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      if: runner.name != 'act'
      with:
        path: docs-site/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
