name: Security Scan

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scheduled-security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install security tools
      run: |
        uv pip install --system pip-audit safety bandit ruff

    - name: Build collection for scanning
      run: |
        uv pip install --system ansible
        ansible-galaxy collection build

    - name: Extract collection
      run: |
        tar -xzf wiphoo-frp-*.tar.gz

    - name: Run Ruff security scan
      run: |
        cd wiphoo-frp-*
        ruff check . --select=S  # Security-related rules

    - name: Run pip-audit
      run: |
        cd wiphoo-frp-*
        pip-audit --format json --output audit-results.json || true

    - name: Run safety check
      run: |
        cd wiphoo-frp-*
        safety check --output safety-results.json || true

    - name: Run bandit security scan
      run: |
        cd wiphoo-frp-*
        bandit -r . -f json -o bandit-results.json || true

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@0.24.0
      with:
        scan-type: 'fs'
        scan-ref: './wiphoo-frp-*'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload security scan results
      uses: actions/upload-artifact@v4
      if: runner.name != 'act'
      with:
        name: scheduled-security-results
        path: |
          wiphoo-frp-*/audit-results.json
          wiphoo-frp-*/safety-results.json
          wiphoo-frp-*/bandit-results.json
          trivy-results.sarif

    - name: Create security issue on failures
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Security Scan Failed - Action Required',
            body: `
            ## Security Scan Alert

            The scheduled security scan has detected potential security issues that require attention.

            **Scan Details:**
            - Date: ${new Date().toISOString()}
            - Branch: ${context.ref}
            - Commit: ${context.sha}

            **Next Steps:**
            1. Review the security scan results in the workflow artifacts
            2. Address any critical or high-severity findings
            3. Update dependencies if vulnerabilities are found
            4. Re-run the security scan after fixes

            **Artifacts:**
            - scheduled-security-results (contains detailed scan results)

            This issue was automatically created by the scheduled security scan workflow.
            `,
            labels: ['security', 'automated', 'urgent']
          })

  dependency-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Check for dependency updates
      run: |
        uv pip install --system pip-tools
        uv pip compile --upgrade --output-file requirements-updated.txt pyproject.toml

    - name: Compare dependencies
      run: |
        if ! diff -q requirements.txt requirements-updated.txt; then
          echo "📦 Dependency updates available!"
          echo "## Dependency Updates Available" >> dependency-report.md
          echo "" >> dependency-report.md
          echo "The following dependencies have newer versions available:" >> dependency-report.md
          echo "" >> dependency-report.md
          diff requirements.txt requirements-updated.txt >> dependency-report.md || true
          echo "" >> dependency-report.md
          echo "Consider updating dependencies and testing thoroughly before merging." >> dependency-report.md
        else
          echo "✅ All dependencies are up to date"
        fi

    - name: Upload dependency report
      uses: actions/upload-artifact@v4
      if: always() && runner.name != 'act'
      with:
        name: dependency-report
        path: dependency-report.md
