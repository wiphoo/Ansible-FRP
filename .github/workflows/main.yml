name: Build & Test Collection

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Run pre-commit hooks
      run: |
        uv run pre-commit run --all-files --show-diff-on-failure

    - name: Lint Ansible code
      run: |
        uv run ansible-lint roles/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python 3.10 with Ansible 8.7.0 (older but stable combination)
          - python-version: '3.10'
            ansible-version: '8.7.0'
          # Python 3.12 with both Ansible versions
          - python-version: '3.12'
            ansible-version: '8.7.0'
          - python-version: '3.12'
            ansible-version: '11.9.0'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install Ansible and test dependencies
      run: |
        uv sync --extra test
        uv pip install ansible==${{ matrix.ansible-version }}

    - name: Run tests
      run: |
        uv run python -m pytest tests/ -v --junitxml=test-results.xml --cov=roles --cov-report=xml --cov-report=html

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12' && matrix.ansible-version == '11.9.0'
      with:
        file: ./coverage.xml
        flags: tests
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}  # optional: fallback token-based auth

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install Ansible
      run: |
        uv sync --extra dev

    - name: Build collection
      run: |
        uv run ansible-galaxy collection build

    - name: Test collection installation
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        uv run ansible-galaxy collection install "$FILE" --force -p ~/.ansible/collections
        uv run ansible-galaxy collection list | grep wiphoo.frp

    - name: Upload collection artifact
      uses: actions/upload-artifact@v4
      if: github.event_name != 'pull_request'
      with:
        name: collection-artifact
        path: wiphoo-frp-*.tar.gz
        retention-days: 30
