name: Build & Test Collection

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --extra dev --extra test

      - name: Install collections
        uses: ./.github/actions/install-collections

      - name: Run pre-commit hooks
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
        run: |
          uv run pre-commit run --all-files --show-diff-on-failure

      - name: Lint Ansible code
        run: |
          uv run ansible-lint roles/
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python 3.10 with Ansible 11.10.0 (older but stable combination)
          - python-version: '3.10'
            ansible-version: '11.10.0'
          # Python 3.12 with both Ansible versions
          - python-version: '3.12'
            ansible-version: '11.10.0'
          - python-version: '3.12'
            ansible-version: '12.0.0'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --extra dev --extra test

      - name: Install collections
        uses: ./.github/actions/install-collections

      - name: Run tests
        run: |
          uv run pytest tests/ -v --junitxml=test-results.xml --tb=short
        continue-on-error: false

      - name: Run Molecule syntax check
        working-directory: roles/frp_install
        run: |
          uv run molecule syntax --scenario-name dev
          uv run molecule syntax --scenario-name ci
          uv run molecule syntax --scenario-name default
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
          ANSIBLE_ALLOW_BROKEN_CONDITIONALS: 1
        continue-on-error: true # Molecule syntax is advisory; full molecule runs are covered elsewhere

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}-${{ matrix.ansible-version }}
          path: |
            test-results.xml
            htmlcov/
            coverage.xml
          retention-days: 7
          if-no-files-found: warn

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12' && matrix.ansible-version == '12.0.0'
        with:
          files: ./coverage.xml
          flags: tests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  sonar:
    name: SonarQube Analysis
    if: ${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_TOKEN != '' }}
    runs-on: ubuntu-latest
    needs: [quality, test]
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Shallow clones do not work with SonarQube

      - name: Download coverage from tests
        uses: actions/download-artifact@v4
        with:
          # Sonar uses the coverage from the canonical (python 3.12 / ansible 12) run
          name: test-results-3.12-12.0.0
          path: test-artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare coverage report
        run: |
          SOURCE_FILE="test-artifacts/coverage.xml"
          if [ ! -f "${SOURCE_FILE}" ]; then
            echo "Error: ${SOURCE_FILE} not found. Ensure the test job uploads coverage."
            exit 1
          fi
          cp "${SOURCE_FILE}" coverage.xml

      - name: Verify coverage file exists
        run: |
          if [ ! -f coverage.xml ]; then
            echo "Error: coverage.xml not found!"
            exit 1
          fi
          echo "Coverage file generated successfully"
          ls -lh coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build:
    name: Build Collection
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Ansible
        run: |
          uv sync --extra dev --extra test

      - name: Build collection
        run: |
          uv run ansible-galaxy collection build

      - name: Test collection installation
        run: |
          FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
          # Install to project collections directory to match Ansible's expectations
          uv run ansible-galaxy collection install "$FILE" --force -p ${{ github.workspace }}/collections
          # Verify installation in the project collections path
          uv run ansible-galaxy collection list -p ${{ github.workspace }}/collections | grep wiphoo.frp
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

      - name: Upload collection artifact
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: collection-artifact
          path: wiphoo-frp-*.tar.gz
          retention-days: 30
