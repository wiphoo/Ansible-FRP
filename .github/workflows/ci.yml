name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install dependencies
      run: |
        uv pip install --system ansible ansible-lint ruff yamllint pre-commit mypy types-PyYAML types-setuptools

    - name: Run pre-commit hooks
      run: |
        pre-commit run --all-files --show-diff-on-failure

    - name: Lint Ansible code
      run: |
        ansible-lint roles/

  test:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
        ansible-version: ['8.7.0', '11.9.0']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install Ansible and test dependencies
      run: |
        uv pip install --system ansible==${{ matrix.ansible-version }}
        uv pip install --system -e ".[test]"

    - name: Run tests
      run: |
        uv run pytest

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.12' && matrix.ansible-version == '9.12.0'
      with:
        file: ./coverage.xml
        flags: tests
        fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: [quality, test]
    outputs:
      collection_file: ${{ steps.collection_file.outputs.collection_file }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v3

    - name: Install Ansible
      run: |
        uv pip install --system ansible

    - name: Build collection
      run: |
        ansible-galaxy collection build

    - name: Determine collection filename
      id: collection_file
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        echo "collection_file=$FILE" >> $GITHUB_OUTPUT

    - name: Test collection installation
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        ansible-galaxy collection install "$FILE" --force -p ~/.ansible/collections
        ansible-galaxy collection list | grep wiphoo.frp

    - name: Upload collection artifact
      uses: actions/upload-artifact@v4
      if: github.event_name != 'pull_request'
      with:
        name: collection-artifact
        path: wiphoo-frp-*.tar.gz
        retention-days: 30
