name: Release Collection

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Build collection
      run: |
        uv run ansible-galaxy collection build

    - name: Test build
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        # Install to project collections directory to match Ansible's expectations
        uv run ansible-galaxy collection install "$FILE" --force -p ./collections
        # Verify installation in the project collections path
        uv run ansible-galaxy collection list -p ./collections | grep wiphoo.frp
      env:
        ANSIBLE_COLLECTIONS_PATHS: ./collections

    - name: Run final tests
      run: |
        uv sync --extra test
        uv run python -m pytest tests/ -v --tb=short
        uv run ansible-lint roles/

    - name: Publish to Ansible Galaxy
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        uv run ansible-galaxy collection publish "$FILE" --api-key "${{ secrets.GALAXY_API_KEY }}"
      if: github.event_name == 'release'
