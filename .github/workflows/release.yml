name: Release Collection

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish)'
        type: boolean
        default: false
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - run: uv sync --extra dev --extra test

      - name: Install collections
        uses: ./.github/actions/install-collections

      - name: Run pre-commit hooks
        env:
          ANSIBLE_COLLECTIONS_PATH: "${{ github.workspace }}/collections"
          ANSIBLE_ROLES_PATH: "${{ github.workspace }}/roles"
        run: uv run pre-commit run --all-files --show-diff-on-failure

      - name: Lint Ansible code
        env:
          ANSIBLE_COLLECTIONS_PATH: "${{ github.workspace }}/collections"
        run: uv run ansible-lint roles/

  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.12'
    - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Install dependencies
      run: uv sync --extra dev --extra test

    - name: Validate version
      run: |
        VERSION=$(grep '^version:' galaxy.yml | sed 's/version: *//' | tr -d '"' | tr -d "'")
        echo "Collection version: $VERSION"
        if [ "${{ github.event_name }}" = "release" ]; then
          TAG_VERSION="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG_VERSION#v}"  # Remove 'v' prefix
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: galaxy.yml version ($VERSION) != release tag ($TAG_VERSION)"
            exit 1
          fi
        fi

    - name: Build collection
      run: |
        uv run ansible-galaxy collection build
        ls -la wiphoo-frp-*.tar.gz

    - name: Test installation
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        uv run ansible-galaxy collection install "$FILE" --force -p ./collections
        uv run ansible-galaxy collection list -p ./collections | grep wiphoo.frp

    - name: Upload artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: collection-${{ github.run_number }}
        path: wiphoo-frp-*.tar.gz

    - name: Publish to Galaxy
      if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        echo "Publishing $FILE to Ansible Galaxy..."
        uv run ansible-galaxy collection publish "$FILE" --api-key "${{ secrets.GALAXY_API_KEY }}"
        echo "✅ Published to https://galaxy.ansible.com/ui/repo/published/wiphoo/frp/"
