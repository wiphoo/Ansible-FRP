name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv pip install --system ansible

    - name: Build collection
      run: |
        ansible-galaxy collection build

    - name: Test build
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        ansible-galaxy collection install "$FILE" --force -p ~/.ansible/collections
        ansible-galaxy collection list | grep wiphoo.frp

    - name: Publish to Ansible Galaxy
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        ansible-galaxy collection publish "$FILE" --api-key "${{ secrets.GALAXY_API_KEY }}"
      if: github.event_name == 'release'
