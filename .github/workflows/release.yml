name: Release Collection

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv sync --extra dev --extra test

    - name: Run pre-commit hooks
      run: |
        uv run pre-commit run --all-files --show-diff-on-failure

    - name: Lint Ansible code
      run: |
        uv run ansible-lint roles/

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    needs: quality
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv sync --extra dev --extra test

    - name: Install collections
      run: |
        uv run ansible-galaxy collection install "community.general>=11.0.0,<12.0.0" "ansible.posix>=2.0.0,<3.0.0" "community.docker>=4.0.0,<5.0.0" -p ${{ github.workspace }}/collections
      env:
         ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

    - name: Build collection
      run: |
        uv run ansible-galaxy collection build

    - name: Test build
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        # Install to project collections directory to match Ansible's expectations
        uv run ansible-galaxy collection install "$FILE" --force -p ${{ github.workspace }}/collections
        # Verify installation in the project collections path
        uv run ansible-galaxy collection list -p ${{ github.workspace }}/collections | grep wiphoo.frp
      env:
         ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

    - name: Run tests and validation
      run: |
        uv run python -m pytest tests/ -v --junitxml=test-results.xml --cov=roles --cov-report=xml --cov-report=html --tb=short
      env:
         ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
      continue-on-error: false

    - name: Run ansible-lint
      run: |
        uv run ansible-lint roles/
      env:
         ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

    - name: Run Molecule validation
      working-directory: roles/frp_install
      run: |
        uv run molecule syntax --scenario-name dev
        uv run molecule syntax --scenario-name ci
        uv run molecule syntax --scenario-name default
      env:
        PY_COLORS: '1'
        ANSIBLE_FORCE_COLOR: '1'
        ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
      continue-on-error: false

    - name: Run final tests
      run: |
        # Final validation that everything works
        echo "All validation checks passed successfully"

    - name: Publish to Ansible Galaxy
      run: |
        FILE=$(ls -1 wiphoo-frp-*.tar.gz | head -1)
        uv run ansible-galaxy collection publish "$FILE" --api-key "${{ secrets.GALAXY_API_KEY }}"
      if: github.event_name == 'release'
