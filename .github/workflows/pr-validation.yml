name: PR Quality & Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

permissions: {} # use job-level permissions below

jobs:
  pr-validation:
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    name: Quick PR Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: |
          uv sync --extra dev --extra test

      - name: Install required Ansible collections for role
        run: |
          # Install all collection dependencies including molecule requirements
          uv run ansible-galaxy collection install "community.general>=11.0.0,<12.0.0" "ansible.posix>=2.0.0,<3.0.0" "community.docker>=4.0.0,<5.0.0" --force -p ${{ github.workspace }}/collections
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

      - name: Run quick checks
        run: |
          if [ -d playbooks ]; then
            uv run ansible-lint roles/ playbooks/
          else
            uv run ansible-lint roles/
          fi
          uv run pre-commit run --all-files --show-diff-on-failure
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

      - name: Build collection
        run: |
          uv run ansible-galaxy collection build

      - name: Test collection installation
        run: |
          # Install to project collections directory to match Ansible's expectations
          uv run ansible-galaxy collection install wiphoo-frp-*.tar.gz --force -p ${{ github.workspace }}/collections
          # Verify installation in the project collections path
          uv run ansible-galaxy collection list -p ${{ github.workspace }}/collections | grep -q '^wiphoo\.frp\s'
          echo "wiphoo.frp collection is installed successfully"
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections

      - name: Run pytest tests
        run: |
          uv run pytest tests/ -v \
            --cov=tests --cov-report=xml --cov-report=term-missing \
            --junitxml=test-results.xml
        env:
          PY_COLORS: '1'

      - name: Run Molecule syntax check
        working-directory: roles/frp_install
        run: |
          uv run molecule syntax --scenario-name dev
          uv run molecule syntax --scenario-name ci
          uv run molecule syntax --scenario-name default
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
          ANSIBLE_ALLOW_BROKEN_CONDITIONALS: 1

      - name: Check test coverage
        run: |
          uv run coverage report --fail-under=85

      - name: Comment PR with test results
        uses: dorny/test-reporter@7b7927aa7da8b82e81e755810cb51f39941a2cc7 # v2.2.0
        if: success() || failure()
        with:
          name: Pytest Results
          path: 'test-results.xml'
          reporter: java-junit
          fail-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage.xml
          flags: pr-check
          name: pr-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }} # optional: fallback token-based auth

  molecule-test:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    name: Molecule Integration Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Setup and run molecule tests
        working-directory: roles/frp_install
        run: |
          uv sync --extra test --extra dev

          # Install collection dependencies directly using molecule requirements
          uv run ansible-galaxy collection install -r molecule/dev/requirements.yml --force -p ${{ github.workspace }}/collections

          echo "🧪 Running dev scenario (fast)..."
          uv run molecule test --scenario-name dev

          echo "🧪 Running CI scenario..."
          uv run molecule test --scenario-name ci

          echo "🧪 Running default scenario..."
          uv run molecule test --scenario-name default
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'

      - name: Generate test report
        if: always()
        run: |
          echo "## 🔬 Molecule Test Results" > molecule-report.md
          echo "" >> molecule-report.md
          echo "**Status:** ${{ job.status }}" >> molecule-report.md
          echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> molecule-report.md
          echo "**Timestamp:** $(date)" >> molecule-report.md

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('molecule-report.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });

      - name: Upload logs on failure
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: molecule-logs
          path: roles/frp_install/.molecule/
          retention-days: 7

  molecule-summary:
    permissions:
      contents: read
      pull-requests: write
    name: Molecule Test Summary
    runs-on: ubuntu-latest
    if: always() && github.event.pull_request.draft == false
    needs: molecule-test
    steps:
      - name: Generate summary
        run: |
          echo "## 🔬 Molecule Test Results" > summary.md
          echo "" >> summary.md
          echo "| Scenario | Status |" >> summary.md
          echo "|----------|--------|" >> summary.md
          echo "| Dev | $([ '${{ needs.molecule-test.result }}' == 'success' ] && echo '✅ PASSED' || echo '❌ FAILED') |" >> summary.md
          echo "| CI | $([ '${{ needs.molecule-test.result }}' == 'success' ] && echo '✅ PASSED' || echo '❌ FAILED') |" >> summary.md
          echo "| Default | $([ '${{ needs.molecule-test.result }}' == 'success' ] && echo '✅ PASSED' || echo '❌ FAILED') |" >> summary.md
          echo "" >> summary.md
          echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> summary.md

      - name: Comment PR
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: summary
            });

      - name: Fail on test failure
        if: needs.molecule-test.result == 'failure'
        run: exit 1

  pr-security:
    permissions:
      contents: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [pr-validation, molecule-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run TruffleHog OSS
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.ref }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          category: '/language:python'

  pr-size:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [pr-validation, molecule-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check PR size
        uses: pascalgn/size-label-action@f8edde36b3be04b4f65dcfead05dc8691b374348 # v0.5.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          sizes: >
            {
              "0": "XS",
              "20": "S",
              "50": "M",
              "100": "L",
              "500": "XL",
              "1000": "XXL"
            }

  pr-docs:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [pr-validation, molecule-test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install docs dependencies
        run: |
          uv sync --extra dev --extra test

      - name: Build documentation
        run: |
          uv run mkdocs build --clean --strict

      - name: Prepare local root for lychee
        run: |
          rm -rf .lychee-root
          mkdir -p .lychee-root
          ln -s ../site .lychee-root/Ansible-FRP

      - name: Check documentation links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --no-progress --verbose --accept 200,206 --max-concurrency 10 --root-dir .lychee-root "site/**/*.html"

      - name: Run yamllint
        run: |
          uv run yamllint . --format github

      - name: Run Ruff linting
        run: |
          uv run ruff check . --output-format=github

      - name: Check code formatting with Ruff
        run: |
          uv run ruff format --check --diff .

  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    if: always()
    needs: [pr-validation, molecule-test, pr-security, pr-size, pr-docs]
    steps:
      - name: Clean up Docker resources
        run: |
          docker system prune -f --volumes
          docker image prune -f
