name: PR Quality & Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main, master ]

permissions:
  contents: read
  pull-requests: write
  checks: write
  id-token: write

jobs:
  pr-validation:
    name: Quick PR Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Run quick checks
      run: |
        uv run ansible-lint roles/
        uv run pre-commit run --all-files --show-diff-on-failure

    - name: Build collection
      run: |
        uv run ansible-galaxy collection build

    - name: Test collection installation
      run: |
        uv run ansible-galaxy collection install wiphoo-frp-*.tar.gz --force -p ~/.ansible/collections

    - name: Install test dependencies
      run: |
        # Install the test dependencies
        uv sync --extra test
        # Then install pytest-cov for coverage reporting
        uv pip install pytest-cov coverage

    - name: Run pytest tests
      run: |
        uv run pytest tests/ -v \
          --cov=tests --cov-report=xml --cov-report=term-missing \
          --junitxml=test-results.xml
      env:
        PY_COLORS: '1'

    - name: Run Molecule syntax check
      run: |
        cd roles/frp_install
        uv run molecule syntax --scenario-name ci
      env:
        PY_COLORS: '1'
        ANSIBLE_FORCE_COLOR: '1'

    - name: Check test coverage
      run: |
        coverage report --fail-under=90

    - name: Comment PR with test results
      uses: dorny/test-reporter@v2
      if: success() || failure()
      with:
        name: Pytest Results
        path: 'test-results.xml'
        reporter: java-junit
        fail-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: pr-check
        name: pr-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}  # optional: fallback token-based auth

  pr-security:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@v3.82.9
      with:
        path: ./
        base: ${{ github.event.pull_request.base.ref }}
        head: HEAD
        extra_args: --debug --only-verified

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python
        queries: security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:python"

  pr-size:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
    - uses: actions/checkout@v4

    - name: Check PR size
      uses: pascalgn/size-label-action@v0.5.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        sizes: >
          {
            "0": "XS",
            "20": "S",
            "50": "M",
            "100": "L",
            "500": "XL",
            "1000": "XXL"
          }

  pr-docs:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install docs dependencies
      run: |
        uv sync --extra dev

    - name: Build documentation
      run: |
        uv run mkdocs build --clean

    - name: Check documentation links
      run: |
        # Check for broken links in documentation
        find site/ -name "*.html" -exec grep -l "href=" {} \; | head -5 | xargs -I {} sh -c 'echo "Checking {}"; curl -s -o /dev/null -w "%{http_code}" $(grep -o "href=\"[^\"]*\"" {} | head -1 | sed "s/href=\"//;s/\"//") || true'

    - name: Run yamllint
      run: |
        uv run yamllint . --format github

    - name: Run Ruff linting
      run: |
        uv run ruff check . --output-format=github

    - name: Check code formatting with Ruff
      run: |
        uv run ruff format --check --diff .
