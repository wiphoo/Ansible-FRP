name: PR Quality & Security

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

permissions: {} # use job-level permissions below

jobs:
  pr-validation:
    permissions:
      contents: read
      checks: write
      pull-requests: write
      id-token: write
    name: Quick PR Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Run quick checks
      run: |
        uv run ansible-lint roles/ playbooks/ || uv run ansible-lint roles/
        uv run pre-commit run --all-files --show-diff-on-failure

    - name: Build collection
      run: |
        uv run ansible-galaxy collection build

    - name: Test collection installation
      run: |
        # Install to project collections directory to match Ansible's expectations
        uv run ansible-galaxy collection install wiphoo-frp-*.tar.gz --force -p ./collections
        # Verify installation in the project collections path
        uv run ansible-galaxy collection list -p ./collections | grep -q '^wiphoo\.frp\s'
        echo "wiphoo.frp collection is installed successfully"
      env:
        ANSIBLE_COLLECTIONS_PATH: ./collections

    - name: Install test dependencies
      run: |
        # Install test dependencies (ensure pytest, pytest-cov, coverage are in [project.optional-dependencies].test)
        uv sync --extra test

    - name: Run pytest tests
      run: |
        uv run pytest tests/ -v \
          --cov=tests --cov-report=xml --cov-report=term-missing \
          --junitxml=test-results.xml
      env:
        PY_COLORS: '1'

    - name: Install required Ansible collections
      run: |
        uv run ansible-galaxy collection install community.general --force -p ./collections
      env:
        ANSIBLE_COLLECTIONS_PATH: ./collections

    - name: Run Molecule syntax check
      run: |
        cd roles/frp_install
        ANSIBLE_ALLOW_BROKEN_CONDITIONALS=1 uv run molecule syntax --scenario-name dev
        ANSIBLE_ALLOW_BROKEN_CONDITIONALS=1 uv run molecule syntax --scenario-name ci
        ANSIBLE_ALLOW_BROKEN_CONDITIONALS=1 uv run molecule syntax --scenario-name default
      env:
        PY_COLORS: '1'
        ANSIBLE_FORCE_COLOR: '1'
        ANSIBLE_ALLOW_BROKEN_CONDITIONALS: 1
        ANSIBLE_COLLECTIONS_PATH: ./collections

    - name: Check test coverage
      run: |
        uv run coverage report --fail-under=85

    - name: Comment PR with test results
      uses: dorny/test-reporter@v2
      if: success() || failure()
      with:
        name: Pytest Results
        path: 'test-results.xml'
        reporter: java-junit
        fail-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: pr-check
        name: pr-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}  # optional: fallback token-based auth

  molecule-test:
    permissions:
      contents: read
      checks: write
      pull-requests: write
    name: Molecule Integration Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Setup and run molecule tests
      run: |
        uv sync --extra dev
        uv add ansible>=11.10

        # Install collection dependencies directly
        uv run ansible-galaxy collection install community.general --force -p ./collections

        cd roles/frp_install
        export ANSIBLE_ALLOW_BROKEN_CONDITIONALS=1

        echo "🧪 Running dev scenario (fast)..."
        uv run molecule test --scenario-name dev

        echo "🧪 Running CI scenario..."
        uv run molecule test --scenario-name ci

        echo "🧪 Running default scenario..."
        uv run molecule test --scenario-name default
      env:
        ANSIBLE_ALLOW_BROKEN_CONDITIONALS: 1
        ANSIBLE_COLLECTIONS_PATH: ./collections
        PY_COLORS: '1'
        ANSIBLE_FORCE_COLOR: '1'

    - name: Generate test report
      if: always()
      run: |
        echo "## 🔬 Molecule Test Results" > molecule-report.md
        echo "" >> molecule-report.md
        echo "**Status:** ${{ job.status }}" >> molecule-report.md
        echo "**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> molecule-report.md
        echo "**Timestamp:** $(date)" >> molecule-report.md

    - name: Comment PR with results
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('molecule-report.md', 'utf8');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: report
          });

    - name: Upload logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: molecule-logs
        path: roles/frp_install/.molecule/
        retention-days: 7

  molecule-summary:
    permissions:
      contents: read
      pull-requests: write
    name: Molecule Test Summary
    runs-on: ubuntu-latest
    if: always() && github.event.pull_request.draft == false
    needs: molecule-test
    steps:
    - name: Generate summary
      run: |
        echo "## 🔬 Molecule Test Results" > summary.md
        echo "" >> summary.md
        echo "| Scenario | Status |" >> summary.md
        echo "|----------|--------|" >> summary.md
        echo "| Dev | $([ '${{ needs.molecule-test.result }}' == 'success' ] && echo '✅ PASSED' || echo '❌ FAILED') |" >> summary.md
        echo "| CI | $([ '${{ needs.molecule-test.result }}' == 'success' ] && echo '✅ PASSED' || echo '❌ FAILED') |" >> summary.md
        echo "| Default | $([ '${{ needs.molecule-test.result }}' == 'success' ] && echo '✅ PASSED' || echo '❌ FAILED') |" >> summary.md
        echo "" >> summary.md
        echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> summary.md

    - name: Comment PR
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('summary.md', 'utf8');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: summary
          });

    - name: Fail on test failure
      if: needs.molecule-test.result == 'failure'
      run: exit 1

  pr-security:
    permissions:
      contents: read
      actions: read
      security-events: write
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [pr-validation, molecule-test]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@v3.82.9
      with:
        path: ./
        base: ${{ github.event.pull_request.base.ref }}
        head: HEAD
        extra_args: --debug --only-verified

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: python
        queries: security-and-quality

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:python"

  pr-size:
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [pr-validation, molecule-test]
    steps:
    - uses: actions/checkout@v4

    - name: Check PR size
      uses: pascalgn/size-label-action@v0.5.4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        sizes: >
          {
            "0": "XS",
            "20": "S",
            "50": "M",
            "100": "L",
            "500": "XL",
            "1000": "XXL"
          }

  pr-docs:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    needs: [pr-validation, molecule-test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v6

    - name: Install docs dependencies
      run: |
        uv sync --extra dev

    - name: Build documentation
      run: |
        uv run mkdocs build --clean --strict

    - name: Check documentation links
      uses: lycheeverse/lychee-action@v1
      with:
        args: --no-progress --verbose --accept 200,206 --max-concurrency 10 "site/**/*.html"

    - name: Run yamllint
      run: |
        uv run yamllint . --format github

    - name: Run Ruff linting
      run: |
        uv run ruff check . --output-format=github

    - name: Check code formatting with Ruff
      run: |
        uv run ruff format --check --diff .

  cleanup:
    name: Cleanup Resources
    runs-on: ubuntu-latest
    if: always()
    needs: [pr-validation, molecule-test, pr-security, pr-size, pr-docs]
    steps:
    - name: Clean up Docker resources
      run: |
        docker system prune -f --volumes
        docker image prune -f
