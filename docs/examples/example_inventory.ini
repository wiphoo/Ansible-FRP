# Example Ansible Inventory for FRP Deployment
# Save this as inventory/hosts.yml or inventory.ini

# === INI FORMAT EXAMPLE ===
[frp_servers]
frp-server-01 ansible_host=203.0.113.10 ansible_user=ubuntu
frp-server-02 ansible_host=203.0.113.11 ansible_user=ubuntu

[frp_clients]
frp-client-01 ansible_host=192.168.1.100 ansible_user=pi
frp-client-02 ansible_host=192.168.1.101 ansible_user=ubuntu
home-server ansible_host=192.168.1.50 ansible_user=admin

# === YAML FORMAT EXAMPLE ===
# If you prefer YAML format, save as inventory/hosts.yml:
#
# all:
#   children:
#     frp_servers:
#       hosts:
#         frp-server-01:
#           ansible_host: 203.0.113.10
#           ansible_user: ubuntu
#         frp-server-02:
#           ansible_host: 203.0.113.11
#           ansible_user: ubuntu
#     frp_clients:
#       hosts:
#         frp-client-01:
#           ansible_host: 192.168.1.100
#           ansible_user: pi
#         frp-client-02:
#           ansible_host: 192.168.1.101
#           ansible_user: ubuntu
#         home-server:
#           ansible_host: 192.168.1.50
#           ansible_user: admin

# === GROUP VARIABLES ===
# Create inventory/group_vars/all.yml for common variables:
#
# frp_install_version: "0.63.0"
# frp_install_auth_token: "{{ vault_frp_token }}"  # Use ansible-vault for security
#
# Create inventory/group_vars/frp_servers.yml for server-specific variables:
#
# frp_install_files: ['frps']
# frp_install_server_addr: "0.0.0.0"
# frp_install_server_port: 7000
# frp_install_dashboard_addr: "127.0.0.1"
# frp_install_dashboard_port: 7500
# frp_install_configure_firewall: true
#
# Create inventory/group_vars/frp_clients.yml for client-specific variables:
#
# frp_install_files: ['frpc']
# frp_install_client_server_addr: "{{ hostvars[groups['frp_servers'][0]]['ansible_host'] }}"
# frp_install_client_server_port: 7000
