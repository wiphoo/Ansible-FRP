# SonarQube Configuration for wiphoo-ansible-frp
# This configuration excludes test directories from code analysis

# Project identification
sonar.projectKey=wiphoo:ansible-frp
sonar.projectName=wiphoo-ansible-frp
sonar.projectVersion=0.2.0

# Source directories (exclude tests)
sonar.sources=roles,plugins,meta,scripts
sonar.sourceEncoding=UTF-8

# Test directories (excluded from main analysis)
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python-specific settings
sonar.python.version=3.11,3.12

# Exclude test files and cache directories from analysis
sonar.exclusions=**/__pycache__/**,**/htmlcov/**,**/.pytest_cache/**,**/.ruff_cache/**,**/.mypy_cache/**,**/*.pyc,**/*.pyo,**/*.pyd

# Test coverage settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=tests/**/*

# Additional exclusions for build artifacts and development files
sonar.exclusions=sonar.exclusions,\
  **/*.tar.gz,\
  **/collections/**,\
  **/.ansible/**,\
  **/.venv/**,\
  **/.vscode/**,\
  **/htmlcov/**,\
  **/coverage.xml,\
  **/codecov.yml,\
  **/.pre-commit-config.yaml,\
  **/.yamllint,\
  **/.ansible-lint,\
  **/uv.lock,\
  **/mkdocs.yml,\
  **/.nojekyll,\
  **/RELEASE_REVIEW_v0.2.0.md

# Quality gate settings
sonar.qualitygate.wait=true

# Code analysis settings
sonar.python.pylint.reportPath=pylint-report.txt
sonar.python.bandit.reportPaths=bandit-report.json
