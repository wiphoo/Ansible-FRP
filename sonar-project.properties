# SonarQube Configuration for wiphoo-ansible-frp
# This configuration excludes test directories from code analysis

# Project identification
sonar.projectKey=wiphoo_Ansible-FRP
sonar.organization=wiphoo-dev

# Source directories (exclude tests)
sonar.sources=roles,plugins,meta,scripts,tests
sonar.sourceEncoding=UTF-8

# Test directories - SonarQube treats 'tests' as test code
sonar.tests=tests
sonar.test.inclusions=tests/**/*.py

# Python-specific settings
sonar.python.version=3.11,3.12

# Exclude test files, caches, and build artifacts from analysis
sonar.exclusions=**/__pycache__/**,**/htmlcov/**,**/.pytest_cache/**,**/.ruff_cache/**,**/.mypy_cache/**,**/*.pyc,**/*.pyo,**/*.pyd,**/*.tar.gz,**/collections/**,**/.ansible/**,**/.venv/**,**/.vscode/**,**/coverage.xml,**/codecov.yml,**/.pre-commit-config.yaml,**/.yamllint,**/.ansible-lint,**/uv.lock,**/mkdocs.yml,**/.nojekyll

# Test coverage settings
# Coverage report includes test code coverage (tests/** directory)
# SonarQube will map coverage data to the corresponding source files
sonar.python.coverage.reportPaths=coverage.xml

# Note: coverage.xml measures test code coverage (96.85%)
# This is intentional as the project tests its test infrastructure

# Quality gate settings
sonar.qualitygate.wait=true

# Code analysis settings
sonar.python.pylint.reportPath=pylint-report.txt
sonar.python.bandit.reportPaths=bandit-report.json
