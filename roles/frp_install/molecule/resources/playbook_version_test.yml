---
- name: Test FRP Version Override
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: wiphoo.frp.frp_install

  post_tasks:
    - name: Verify frp binaries are installed
      ansible.builtin.stat:
        path: "{{ frp_install_dir }}/{{ item }}"
      loop: "{{ frp_install_files }}"
      register: frp_binaries

    - name: Assert frp binaries exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "frp binary {{ item.item }} was not installed"
      loop: "{{ frp_binaries.results }}"

    - name: Verify the correct version was downloaded
      ansible.builtin.command:
        cmd: "{{ frp_install_dir }}/{{ item }} --version"
      register: frp_version_output
      changed_when: false
      ignore_errors: true
      loop: "{{ frp_install_files }}"

    - name: Check if version matches expected (0.64.0)
      ansible.builtin.debug:
        msg: |
          Expected version: 0.64.0
          Installed version output for {{ item.item }}: {{ item.stdout | default('N/A') }}
          Version check result: {{ 'PASS' if '0.64.0' in item.stdout else
                                   'Version check inconclusive (binary may not support --version)' }}
      loop: "{{ frp_version_output.results }}"

    - name: Verify download URLs were constructed correctly
      ansible.builtin.debug:
        msg: |
          Download URL used: {{ frp_install_download_url }}
          Expected to contain: 0.64.0
          URL validation: {{ 'PASS' if '0.64.0' in frp_install_download_url else 'FAIL' }}

    - name: Assert version is correctly used in download URL
      ansible.builtin.assert:
        that: "'0.64.0' in frp_install_download_url"
        fail_msg: "Version 0.64.0 was not properly used in download URL: {{ frp_install_download_url }}"

    - name: Verify frp user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ frp_install_user }}"

    - name: Verify frp group exists
      ansible.builtin.getent:
        database: group
        key: "{{ frp_install_group }}"
