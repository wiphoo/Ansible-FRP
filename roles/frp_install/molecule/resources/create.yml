---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  no_log: "{{ molecule_no_log }}"
  vars:
    molecule_labels:
      owner: molecule
  tasks:
    - name: Set async_dir for HOME env
      ansible.builtin.set_fact:
        ansible_async_dir: "{{ lookup('env', 'HOME') }}/.ansible_async/"
      when: lookup('env', 'HOME') | length > 0

    - name: Log into a Docker registry
      community.docker.docker_login:
        username: "{{ item.registry.credentials.username }}"
        password: "{{ item.registry.credentials.password }}"
        email: "{{ item.registry.credentials.email | default(omit) }}"
        registry: "{{ item.registry.url }}"
        docker_host: "{{ item.docker_host | default(lookup('env', 'DOCKER_HOST') or 'unix://var/run/docker.sock') }}"
        cacert_path: "{{ item.cacert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/ca.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        cert_path: "{{ item.cert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/cert.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        key_path: "{{ item.key_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/key.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        tls_verify: "{{ item.tls_verify | default(lookup('env', 'DOCKER_TLS_VERIFY')) or false }}"
      with_items: "{{ molecule_yml.platforms }}"
      when:
        - item.registry is defined
        - item.registry.credentials is defined
        - item.registry.credentials.username is defined
      no_log: true

    - name: Check presence of custom Dockerfiles
      ansible.builtin.stat:
        path: "{{ molecule_scenario_directory + '/' + (item.dockerfile | default('Dockerfile.j2')) }}"
      loop: "{{ molecule_yml.platforms }}"
      register: dockerfile_stats

    - name: Create Dockerfiles from image names
      ansible.builtin.template:
        src: "{%- if dockerfile_stats.results[i].stat.exists -%}\
          {{ molecule_scenario_directory + '/' + (item.dockerfile | default('Dockerfile.j2')) }}\
          {%- else -%}\
          {{ playbook_dir + '/Dockerfile.j2' }}\
          {%- endif -%}"
        dest: "{{ molecule_ephemeral_directory }}/Dockerfile_{{ item.image | regex_replace('[^a-zA-Z0-9_]', '_') }}"
        mode: "0600"
      loop: "{{ molecule_yml.platforms }}"
      loop_control:
        index_var: i
      when: not item.pre_build_image | default(false)
      register: platforms

    - name: Discover local Docker images
      community.docker.docker_image_info:
        name: "molecule_local/{{ item.item.name }}"
        docker_host: "{{ item.item.docker_host | default(lookup('env', 'DOCKER_HOST') or 'unix://var/run/docker.sock') }}"
        cacert_path: "{{ item.item.cacert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/ca.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        cert_path: "{{ item.item.cert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/cert.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        key_path: "{{ item.item.key_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/key.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        tls_verify: "{{ item.item.tls_verify | default(lookup('env', 'DOCKER_TLS_VERIFY')) or false }}"
        tls_hostname: "{{ item.item.tls_hostname | default(lookup('env', 'DOCKER_TLS_HOSTNAME')) | default(omit) }}"
        api_version: "{{ item.item.api_version | default(lookup('env', 'DOCKER_API_VERSION')) | default('auto') }}"
      with_items: "{{ platforms.results }}"
      when:
        - not item.item.pre_build_image | default(false)
        - item.changed | default(false)
      register: docker_images

    - name: Build an Ansible compatible image (new)
      community.docker.docker_image:
        name: "molecule_local/{{ item.item.name }}"
        build:
          path: "{{ molecule_ephemeral_directory }}"
          dockerfile: "{{ item.dest }}"
          pull: "{{ item.item.pull | default(true) }}"
          network_mode: "{{ item.item.network_mode | default(omit) }}"
          args: "{{ item.item.build_args | default(omit) }}"
        source: build
        docker_host: "{{ item.item.docker_host | default(lookup('env', 'DOCKER_HOST') or 'unix://var/run/docker.sock') }}"
        cacert_path: "{{ item.item.cacert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/ca.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        cert_path: "{{ item.item.cert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/cert.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        key_path: "{{ item.item.key_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/key.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        tls_verify: "{{ item.item.tls_verify | default(lookup('env', 'DOCKER_TLS_VERIFY')) or false }}"
        tls_hostname: "{{ item.item.tls_hostname | default(lookup('env', 'DOCKER_TLS_HOSTNAME')) | default(omit) }}"
        api_version: "{{ item.item.api_version | default(lookup('env', 'DOCKER_API_VERSION')) | default('auto') }}"
        timeout: "{{ item.item.timeout | default(60) }}"
      with_items: "{{ platforms.results }}"
      when:
        - platforms.changed | default(false)
        - item.item is defined
        - item.item.pre_build_image | default(false) == false
        - item.changed | default(false)

    - name: Create docker network(s)
      community.docker.docker_network:
        name: "{{ item.networks | first }}"
        docker_host: "{{ item.docker_host | default(lookup('env', 'DOCKER_HOST') or 'unix://var/run/docker.sock') }}"
        cacert_path: "{{ item.cacert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/ca.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        cert_path: "{{ item.cert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/cert.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        key_path: "{{ item.key_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/key.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        tls_verify: "{{ item.tls_verify | default(lookup('env', 'DOCKER_TLS_VERIFY')) or false }}"
        tls_hostname: "{{ item.tls_hostname | default(lookup('env', 'DOCKER_TLS_HOSTNAME')) | default(omit) }}"
        api_version: "{{ item.api_version | default(lookup('env', 'DOCKER_API_VERSION')) | default('auto') }}"
      loop: "{{ molecule_yml.platforms }}"
      when: 
        - item.networks is defined
        - item.networks | length > 0

    - name: Determine the CMD directives
      ansible.builtin.set_fact:
        molecule_docker_command: >-
          {{ item.command
             | default('bash -c "while true; do sleep 10000; done"') }}
      with_items: "{{ molecule_yml.platforms }}"
      register: molecule_docker_command
      when: item.override_command | default(true)

    - name: Create molecule instance(s)
      community.docker.docker_container:
        name: "{{ item.name }}"
        docker_host: "{{ item.docker_host | default(lookup('env', 'DOCKER_HOST') or 'unix://var/run/docker.sock') }}"
        hostname: "{{ item.hostname | default(item.name) }}"
        image: "{{ item.pre_build_image | default(false) | ternary('', 'molecule_local/') }}{{ item.image }}"
        state: started
        recreate: false
        log_driver: json-file
        command: "{{ (molecule_docker_command.results | selectattr('item.name', 'equalto', item.name) | list | first).ansible_facts.molecule_docker_command | default(omit) }}"
        user: "{{ item.user | default(omit) }}"
        pid_mode: "{{ item.pid_mode | default(omit) }}"
        privileged: "{{ item.privileged | default(omit) }}"
        security_opts: "{{ item.security_opts | default(omit) }}"
        devices: "{{ item.devices | default(omit) }}"
        links: "{{ item.links | default(omit) }}"
        volumes: "{{ item.volumes | default(omit) }}"
        tmpfs: "{{ item.tmpfs | default(omit) }}"
        capabilities: "{{ item.capabilities | default(omit) }}"
        exposed_ports: "{{ item.exposed_ports | default(omit) }}"
        published_ports: "{{ item.published_ports | default(omit) }}"
        ulimits: "{{ item.ulimits | default(omit) }}"
        networks: "{{ item.networks | default(omit) }}"
        network_mode: "{{ item.network_mode | default(omit) }}"
        purge_networks: "{{ item.purge_networks | default(omit) }}"
        dns_servers: "{{ item.dns_servers | default(omit) }}"
        etc_hosts: "{{ item.etc_hosts | default(omit) }}"
        env: "{{ item.env | default(omit) }}"
        restart_policy: "{{ item.restart_policy | default(omit) }}"
        restart_retries: "{{ item.restart_retries | default(omit) }}"
        tty: "{{ item.tty | default(true) }}"
        labels: "{{ molecule_labels | combine(item.labels | default({})) }}"
        sysctls: "{{ item.sysctls | default(omit) }}"
        memory: "{{ item.memory | default(omit) }}"
        memory_swap: "{{ item.memory_swap | default(omit) }}"
        memory_swappiness: "{{ item.memory_swappiness | default(omit) }}"
        oom_killer: "{{ item.oom_killer | default(omit) }}"
        oom_score_adj: "{{ item.oom_score_adj | default(omit) }}"
        cpus: "{{ item.cpus | default(omit) }}"
        cpuset_cpus: "{{ item.cpuset_cpus | default(omit) }}"
        cpuset_mems: "{{ item.cpuset_mems | default(omit) }}"
        cpu_shares: "{{ item.cpu_shares | default(omit) }}"
        shm_size: "{{ item.shm_size | default(omit) }}"
        cgroupns_mode: "{{ item.cgroupns_mode | default(omit) }}"
        cacert_path: "{{ item.cacert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/ca.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        cert_path: "{{ item.cert_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/cert.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        key_path: "{{ item.key_path | default((lookup('env', 'DOCKER_CERT_PATH') + '/key.pem') if lookup('env', 'DOCKER_CERT_PATH') else omit) }}"
        tls_verify: "{{ item.tls_verify | default(lookup('env', 'DOCKER_TLS_VERIFY')) or false }}"
        tls_hostname: "{{ item.tls_hostname | default(lookup('env', 'DOCKER_TLS_HOSTNAME')) | default(omit) }}"
        api_version: "{{ item.api_version | default(lookup('env', 'DOCKER_API_VERSION')) | default('auto') }}"
        timeout: "{{ item.timeout | default(60) }}"
      register: server
      with_items: "{{ molecule_yml.platforms }}"
      
    - name: Print some info
      ansible.builtin.debug:
        msg: "{{ item.name }}"
      with_items: "{{ molecule_yml.platforms }}"
      when: molecule_yml.driver.options.ansible_connection_options.connection | default("") == "ssh"
