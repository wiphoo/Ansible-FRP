---
- name: Quick Converge (No Services)
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - curl
          - ca-certificates
          - gnupg
          - software-properties-common
        state: present

  roles:
    - role: frp_install
