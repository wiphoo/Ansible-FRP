---
- name: Quick Verification (No Services)
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Verify frp binaries are installed
      ansible.builtin.stat:
        path: "{{ frp_install_dir }}/{{ item }}"
      loop: "{{ frp_install_files }}"
      register: frp_binaries

    - name: Assert frp binaries exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "frp binary {{ item.item }} was not installed"
      loop: "{{ frp_binaries.results }}"

    - name: Check if frp binaries are executable
      ansible.builtin.command: "ls -la {{ frp_install_dir }}"
      register: ls_output
      changed_when: false

    - name: Assert binaries are executable
      ansible.builtin.assert:
        that: "'-rwxr-xr-x' in ls_output.stdout"
        fail_msg: "frp binaries are not executable"

    - name: Test frp version command
      ansible.builtin.command: "{{ frp_install_dir }}/frps --version"
      register: version_output
      changed_when: false

    - name: Verify version output contains expected version
      ansible.builtin.assert:
        that: frp_install_version in version_output.stdout
        fail_msg: "frps version output does not contain expected version {{ frp_install_version }}"

    - name: Verify directories exist
      ansible.builtin.stat:
        path: "{{ item }}"
      loop: "{{ frp_install_dirs }}"
      register: frp_directories

    - name: Assert directories exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Directory {{ item.item }} was not created"
      loop: "{{ frp_directories.results }}"

    - name: Verify user and group existence
      ansible.builtin.shell: |
        getent passwd {{ frp_install_user }} && getent group {{ frp_install_group }}
      register: user_group_check
      changed_when: false
      failed_when: user_group_check.rc != 0

    - name: Display verification summary
      ansible.builtin.debug:
        msg:
          - "✅ FRP binaries installed and executable"
          - "✅ Version {{ frp_install_version }} confirmed"
          - "✅ All directories created"
          - "✅ User {{ frp_install_user }} and group {{ frp_install_group }} exist"
          - "ℹ️  Service creation skipped for quick test"
