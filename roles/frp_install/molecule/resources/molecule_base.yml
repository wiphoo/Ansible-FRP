---
# Consolidated Molecule Configuration Base
# Shared components for all scenarios - keeps configurations DRY and maintainable

# =============================================================================
# SHARED YAML ANCHORS
# =============================================================================

# Base components
base_dependency: &base_dependency {name: galaxy}
base_driver: &base_driver {name: docker}  
base_verifier: &base_verifier {name: ansible}

# Base provisioner
base_provisioner: &base_provisioner
  name: ansible
  config_options: {defaults: {callbacks_enabled: profile_tasks, timer}}

# =============================================================================
# PLATFORM DEFINITIONS
# =============================================================================

# Production platform (with systemd)
platform_production: &platform_production
  image: geerlingguy/docker-ubuntu2204-ansible:latest
  command: /lib/systemd/systemd
  volumes: [/sys/fs/cgroup:/sys/fs/cgroup:ro]
  privileged: true
  pre_build_image: true
  tmpfs: [/run, /tmp, /run/lock]

# Development platform (lightweight, no systemd)
platform_dev: &platform_dev
  image: ubuntu:22.04
  command: sleep infinity
  pre_build_image: true
  privileged: false
  env: {DEBIAN_FRONTEND: noninteractive}

# =============================================================================
# PLAYBOOK SETS
# =============================================================================

# Standard playbooks
playbooks_standard: &playbooks_standard
  create: ../resources/create.yml
  converge: ../resources/playbook.yml
  verify: ../resources/verify.yml
  destroy: ../resources/destroy.yml

# Quick playbooks (minimal testing)
playbooks_quick: &playbooks_quick
  create: ../resources/create.yml
  converge: ../resources/playbook_quick.yml
  verify: ../resources/verify_quick.yml
  destroy: ../resources/destroy.yml

# Version test playbooks
playbooks_version: &playbooks_version
  create: ../resources/create.yml
  converge: ../resources/playbook_version_test.yml
  verify: ../resources/verify_version_test.yml
  destroy: ../resources/destroy.yml

# =============================================================================
# VARIABLE SETS
# =============================================================================

# Production variables (with systemd service)
vars_production: &vars_production
  frp_install_version: "0.63.0"
  frp_install_create_service: true

# Development variables (no systemd service)  
vars_dev: &vars_dev
  frp_install_version: "0.63.0"
  frp_install_create_service: false

# Version test variables
vars_version: &vars_version
  frp_version: "0.64.0"  # User-facing variable
  frp_install_create_service: true

# =============================================================================
# TEST SEQUENCES
# =============================================================================

# Full production test sequence
sequence_full: &sequence_full [dependency, cleanup, destroy, syntax, create, converge, idempotence, verify, cleanup, destroy]

# Standard test sequence (no idempotence)
sequence_standard: &sequence_standard [dependency, cleanup, destroy, syntax, create, converge, verify, cleanup, destroy]

# Quick test sequence (development)
sequence_quick: &sequence_quick
  - syntax
  - create
  - converge
  - verify
  - destroy
  - syntax
  - create
  - converge
  - verify
  - cleanup
  - destroy
