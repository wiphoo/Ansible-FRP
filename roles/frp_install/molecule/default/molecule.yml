---
# =============================================================================
# DEFAULT SCENARIO - Complete Production Testing
# =============================================================================
# Purpose: Comprehensive testing with idempotence validation and full verification
# Use for: Release testing, production readiness, comprehensive validation
# Benefits: Full test suite including idempotence, most thorough validation

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: instance
    # Pre-built image for production-like testing without systemd complexity
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: sleep infinity
    pre_build_image: true
    privileged: false
    env:
      DEBIAN_FRONTEND: noninteractive

provisioner:
  name: ansible
  config_options:
    defaults:
      # callbacks_enabled: profile_tasks, timer  # These plugins are not available
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../../../
  playbooks:
    create: ../resources/create_simple.yml
    converge: ../resources/playbook.yml
    verify: ../resources/verify.yml
    destroy: ../resources/destroy.yml
  inventory:
    group_vars:
      all:
        frp_install_version: "0.63.0"
        frp_install_create_service: false  # Disable systemd service for non-systemd container
        # Test credentials for molecule testing
        frp_install_auth_token: "test_molecule_token_12345"
        frp_install_dashboard_password: "test_molecule_dashboard_pass"
        frp_install_client_webserver_password: "test_molecule_client_pass"

verifier:
  name: ansible

scenario:
  name: default
  # Full test sequence without idempotence (role downloads files by design)
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - converge
    - verify
    - cleanup
    - destroy
