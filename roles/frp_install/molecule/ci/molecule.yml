---
# =============================================================================
# CI SCENARIO - Continuous Integration & Version Testing
# =============================================================================
# Purpose: Automated CI/CD testing with version compatibility validation
# Use for: GitHub Actions, GitLab CI, version upgrades, automated builds
# Benefits: Fast CI execution, version override testing, no idempotence overhead

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: ci-instance
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: sleep infinity
    pre_build_image: true
    privileged: false
    env:
      DEBIAN_FRONTEND: noninteractive

provisioner:
  name: ansible
  config_options:
    defaults:
      # callbacks_enabled: profile_tasks, timer  # These plugins are not available
      host_key_checking: false
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/../../../
  env:
    ANSIBLE_REMOTE_TMP: /tmp/.ansible/tmp
  playbooks:
    create: ../resources/create_simple.yml
    converge: ../resources/playbook_version_test.yml
    verify: ../resources/verify_version_test.yml
    destroy: ../resources/destroy.yml
  inventory:
    group_vars:
      all:
        # Test version override functionality (0.64.0 vs default 0.63.0)
        frp_version: "0.64.0"
        frp_install_create_service: false
        # Test credentials for molecule testing
        frp_install_auth_token: "test_molecule_token_12345"
        frp_install_dashboard_password: "test_molecule_dashboard_pass"
        frp_install_client_webserver_password: "test_molecule_client_pass"

verifier:
  name: ansible

scenario:
  name: ci
  # CI-optimized sequence: comprehensive testing without idempotence (role downloads files by design)
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - converge
    - verify
    - cleanup
    - destroy
