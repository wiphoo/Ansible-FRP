[defaults]
remote_tmp = /tmp
local_tmp = /tmp
host_key_checking = False
deprecation_warnings = False
stdout_callback = yaml
gathering = implicit
timeout = 30

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o ConnectionAttempts=100 -o UserKnownHostsFile=/dev/null
control_path_dir = /tmp
