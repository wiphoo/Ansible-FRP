---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Check that frp directory exists
      ansible.builtin.file:
        path: "{{ frp_install_dir }}"
        state: directory
      check_mode: true

    - name: Check that frp binaries exist
      ansible.builtin.stat:
        path: "{{ frp_install_dir }}/{{ item }}"
      loop:
        - frpc
        - frps
      register: frp_binaries

    - name: Verify frp binaries are executable
      ansible.builtin.assert:
        that:
          - item.stat.exists
          - item.stat.executable
        fail_msg: "FRP binary {{ item.item }} is not executable or does not exist"
      loop: "{{ frp_binaries.results }}"

    - name: Check frp configuration directory
      ansible.builtin.file:
        path: "{{ frp_install_config_dir }}"
        state: directory
      check_mode: true

    - name: Check that frp user exists
      ansible.builtin.getent:
        database: passwd
        key: "{{ frp_install_user }}"
