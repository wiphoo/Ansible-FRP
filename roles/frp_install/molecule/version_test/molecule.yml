---
# =============================================================================
# VERSION_TEST SCENARIO - Version Compatibility Testing
# =============================================================================
# Purpose: Test different FRP versions and user-facing variable mappings
# Use for: Version upgrades, compatibility validation, user interface testing
# Benefits: Tests frp_version → frp_install_version mapping

dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: instance
    # Pre-built image for reliable version testing without systemd complexity
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    command: sleep infinity
    pre_build_image: true
    privileged: false
    env:
      DEBIAN_FRONTEND: noninteractive

provisioner:
  name: ansible
  config_options:
    defaults:
      callbacks_enabled: profile_tasks, timer
  playbooks:
    create: ../resources/create_simple.yml
    converge: ../resources/playbook_version_test.yml
    verify: ../resources/verify_version_test.yml
    destroy: ../resources/destroy.yml
  inventory:
    group_vars:
      all:
        # Test user-facing variable mapping
        frp_version: "0.64.0"  # User interface variable
        frp_install_create_service: false  # Disable systemd for container testing

verifier:
  name: ansible

scenario:
  name: version_test
  # Complete test sequence for version validation
  test_sequence: 
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - converge
    - verify
    - cleanup
    - destroy
