repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0  # Updated to stable version
    hooks:
      - id: check-json
        exclude: ^(collections/|\.venv/)
      - id: check-toml
      - id: trailing-whitespace
        exclude: ^(collections/|\.venv/|htmlcov/)
      - id: end-of-file-fixer
        exclude: ^(collections/|\.venv/|htmlcov/)
      - id: check-yaml
        exclude: ^(collections/|\.venv/)
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.13.0
    hooks:
      # Run the linter.
      - id: ruff
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        name: ruff-format-check

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.35.1  # Aligned with pyproject.toml version constraint
    hooks:
      - id: yamllint
        args: [--config-file=.yamllint]  # Use project's yamllint config

  - repo: https://github.com/ansible/ansible-lint
    rev: v25.8.2  # Match local version
    hooks:
      - id: ansible-lint
        additional_dependencies:
          - ansible-core==2.19.2
          - ansible-compat>=25.8.1
        files: \.(yaml|yml)$
        exclude: ^(collections/|\.venv/|\.github/|roles/.*/molecule/resources/)
        args: [--project-dir=.]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2  # Updated to stable version matching project constraint
    hooks:
      - id: mypy
        additional_dependencies: [
          types-PyYAML>=6.0.0,
          types-setuptools>=75.0.0
        ]
        args: [--ignore-missing-imports, --show-error-codes, --no-strict-optional]
        exclude: ^(collections/|\.venv/|build/|dist/)
